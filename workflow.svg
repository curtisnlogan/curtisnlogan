<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 1130" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif">
  <defs>
    <marker id="ah-gray" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#8b8f98" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="ah-green" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#3fa554" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="900" height="1130" fill="#0f1117"/>

  <!-- define / constraints / design -->
  <rect x="270" y="60" width="340" height="200" rx="12" fill="#16181f" stroke="#2a2d36" stroke-width="1"/>
  <text x="300" y="100" font-size="18" font-weight="700" fill="#e8eaed">define</text>
  <text x="316" y="122" font-size="12" fill="#8b8f98">1. problem · 2. success · 3. non-goals</text>
  <text x="300" y="152" font-size="18" font-weight="700" fill="#e8eaed">constraints</text>
  <text x="316" y="174" font-size="12" fill="#8b8f98">1. domain · 2. technical · 3. budgets</text>
  <text x="300" y="204" font-size="18" font-weight="700" fill="#e8eaed">design</text>
  <text x="316" y="226" font-size="12" fill="#8b8f98">1. behaviour · 2. structure · 3. interfaces</text>

  <line x1="440" y1="260" x2="440" y2="302" stroke="#8b8f98" stroke-width="1.2" marker-end="url(#ah-gray)"/>

  <!-- build / ship -->
  <rect x="260" y="310" width="360" height="434" rx="12" fill="#0e1a12" stroke="#3fa554" stroke-width="1"/>
  <text x="292" y="352" font-size="12" font-weight="600" fill="#7d8590" letter-spacing="3">BUILD</text>
  <text x="292" y="392" font-size="17" font-weight="700" fill="#4ade80">form a slice</text>
  <text x="308" y="416" font-size="12" fill="#6b9e7a">1. vertical · 2. riskiest first · 3. small</text>
  <text x="292" y="454" font-size="17" font-weight="700" fill="#4ade80">build the minimum</text>
  <text x="292" y="492" font-size="17" font-weight="700" fill="#4ade80">verify intent</text>
  <text x="308" y="516" font-size="12" fill="#6b9e7a">1. tests · 2. benchmarks · 3. feel</text>
  <text x="292" y="554" font-size="17" font-weight="700" fill="#4ade80">small refactors</text>
  <text x="292" y="598" font-size="12" font-weight="600" fill="#7d8590" letter-spacing="3">SHIP</text>
  <text x="292" y="638" font-size="17" font-weight="700" fill="#4ade80">document</text>
  <text x="292" y="676" font-size="17" font-weight="700" fill="#4ade80">review</text>
  <text x="292" y="714" font-size="17" font-weight="700" fill="#4ade80">release</text>

  <!-- re-verify loop -->
  <path d="M620 548 L670 548 L670 486 L630 486" fill="none" stroke="#3fa554" stroke-width="1.2" marker-end="url(#ah-green)"/>
  <text x="690" y="524" font-size="13" font-style="italic" fill="#8b8f98">&#8635; re-verify</text>

  <line x1="440" y1="744" x2="440" y2="786" stroke="#8b8f98" stroke-width="1.2" marker-end="url(#ah-gray)"/>

  <!-- observe / learn / decide -->
  <rect x="280" y="794" width="320" height="170" rx="12" fill="#16121f" stroke="#7c5cbf" stroke-width="1"/>
  <text x="310" y="834" font-size="18" font-weight="700" fill="#a78bfa">observe</text>
  <text x="310" y="876" font-size="18" font-weight="700" fill="#a78bfa">learn</text>
  <text x="310" y="918" font-size="18" font-weight="700" fill="#a78bfa">decide</text>
  <text x="326" y="940" font-size="12" fill="#8f7bbf">1. done · 2. slice · 3. revise</text>

  <!-- slice loop -->
  <path d="M600 912 L790 912 L790 386 L630 386" fill="none" stroke="#3fa554" stroke-width="1.2" marker-end="url(#ah-green)"/>
  <text x="806" y="600" font-size="13" font-style="italic" fill="#8b8f98">&#8635; slice</text>

  <!-- revise: trunk plus three branches -->
  <path d="M280 912 L160 912 L160 95" fill="none" stroke="#8b8f98" stroke-width="1" stroke-dasharray="5 5"/>
  <path d="M160 95 L260 95" fill="none" stroke="#8b8f98" stroke-width="1" stroke-dasharray="5 5" marker-end="url(#ah-gray)"/>
  <path d="M160 147 L260 147" fill="none" stroke="#8b8f98" stroke-width="1" stroke-dasharray="5 5" marker-end="url(#ah-gray)"/>
  <path d="M160 199 L260 199" fill="none" stroke="#8b8f98" stroke-width="1" stroke-dasharray="5 5" marker-end="url(#ah-gray)"/>
  <text x="148" y="500" font-size="13" font-style="italic" fill="#8b8f98" text-anchor="end">&#8635; revise</text>

  <line x1="440" y1="964" x2="440" y2="1006" stroke="#8b8f98" stroke-width="1.2" marker-end="url(#ah-gray)"/>

  <!-- done -->
  <rect x="360" y="1014" width="160" height="72" rx="12" fill="#14161c" stroke="#2a2d36" stroke-width="1"/>
  <text x="440" y="1045" font-size="18" font-weight="700" fill="#e8eaed" text-anchor="middle">done</text>
  <text x="440" y="1069" font-size="13" font-style="italic" fill="#8b8f98" text-anchor="middle">for now</text>
</svg>
