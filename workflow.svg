<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 1330" font-family="-apple-system, 'Segoe UI', Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrowGrey" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#8b949e"/>
    </marker>
    <marker id="arrowGreen" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#3fb950"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="900" height="1330" fill="#0d1117"/>

  <!-- define box -->
  <rect x="260" y="50" width="400" height="330" rx="14" fill="#161b22" stroke="#30363d" stroke-width="1.5"/>
  <text x="290" y="112" font-size="24" font-weight="600" fill="#e6edf3">define</text>
  <text x="290" y="160" font-size="24" font-weight="600" fill="#e6edf3">constraints</text>
  <text x="330" y="198" font-size="21" fill="#9ea7b3">domain</text>
  <text x="330" y="232" font-size="21" fill="#9ea7b3">technical</text>
  <text x="290" y="282" font-size="24" font-weight="600" fill="#e6edf3">design</text>
  <text x="330" y="320" font-size="21" fill="#9ea7b3">structure</text>
  <text x="330" y="354" font-size="21" fill="#9ea7b3">behaviour</text>

  <!-- arrow define -> loop -->
  <line x1="460" y1="380" x2="460" y2="446" stroke="#8b949e" stroke-width="1.5" marker-end="url(#arrowGrey)"/>

  <!-- green loop box -->
  <rect x="260" y="450" width="400" height="450" rx="14" fill="#0f1f14" stroke="#2ea043" stroke-width="1.5"/>

  <text x="290" y="505" font-size="13" font-weight="600" letter-spacing="3" fill="#8b949e">BUILD</text>
  <text x="290" y="548" font-size="24" font-weight="600" fill="#56d364">form a slice</text>
  <text x="290" y="594" font-size="24" font-weight="600" fill="#56d364">minimal implementation</text>
  <text x="290" y="640" font-size="24" font-weight="600" fill="#56d364">verify</text>
  <text x="290" y="686" font-size="24" font-weight="600" fill="#56d364">small refactors</text>

  <text x="290" y="742" font-size="13" font-weight="600" letter-spacing="3" fill="#8b949e">SHIP</text>
  <text x="290" y="785" font-size="24" font-weight="600" fill="#56d364">document</text>
  <text x="290" y="831" font-size="24" font-weight="600" fill="#56d364">review</text>
  <text x="290" y="877" font-size="24" font-weight="600" fill="#56d364">deliver</text>

  <!-- re-verify loop: small refactors -> verify -->
  <path d="M 660 678 H 722 Q 730 678 730 670 V 640 Q 730 632 722 632 H 668" fill="none" stroke="#2ea043" stroke-width="1.5" marker-end="url(#arrowGreen)"/>
  <text x="700" y="725" font-size="20" font-style="italic" fill="#8b949e">&#8635; re-verify</text>

  <!-- arrow loop -> observe/decide -->
  <line x1="460" y1="900" x2="460" y2="966" stroke="#8b949e" stroke-width="1.5" marker-end="url(#arrowGrey)"/>

  <!-- observe/decide box -->
  <rect x="260" y="970" width="400" height="160" rx="14" fill="#1a1524" stroke="#8957e5" stroke-width="1.5"/>
  <text x="290" y="1023" font-size="24" font-weight="600" fill="#b392f0">observe</text>
  <text x="290" y="1066" font-size="24" font-weight="600" fill="#b392f0">learn</text>
  <text x="290" y="1109" font-size="24" font-weight="600" fill="#b392f0">decide</text>

  <!-- next loop: decide -> vertical slice -->
  <path d="M 660 1102 H 802 Q 810 1102 810 1094 V 548 Q 810 540 802 540 H 668" fill="none" stroke="#2ea043" stroke-width="1.5" marker-end="url(#arrowGreen)"/>
  <text x="822" y="790" font-size="20" font-style="italic" fill="#8b949e">&#8635; next slice</text>

  <!-- revise loop (dashed): decide -> design -->
  <path d="M 260 1102 H 148 Q 140 1102 140 1094 V 160 Q 140 152 148 152 H 252" fill="none" stroke="#8b949e" stroke-width="1.5" stroke-dasharray="6 6" marker-end="url(#arrowGrey)"/>
  <text x="52" y="650" font-size="20" font-style="italic" fill="#8b949e">&#8635; revise</text>

  <!-- arrow decide -> done -->
  <line x1="460" y1="1130" x2="460" y2="1186" stroke="#8b949e" stroke-width="1.5" marker-end="url(#arrowGrey)"/>

  <!-- done box -->
  <rect x="370" y="1190" width="180" height="100" rx="14" fill="#161b22" stroke="#30363d" stroke-width="1.5"/>
  <text x="460" y="1232" font-size="24" font-weight="600" fill="#e6edf3" text-anchor="middle">done</text>
  <text x="460" y="1264" font-size="20" font-style="italic" fill="#8b949e" text-anchor="middle">for now</text>
</svg>
